<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Online Bingo Card Generator | Free Bingo Game by Zam Hendrick</title>

    <meta
        name="description"
        content="Generate and play free online Bingo cards instantly. Interactive Bingo board with randomized numbers and free center space."
    />

    <meta
        name="keywords"
        content="bingo, online bingo, bingo card generator, free bingo, bingo game"
    />

    <meta name="author" content="Zam Hendrick" />
    <meta property="og:title" content="Online Bingo Card Generator">
<meta property="og:description" content="Generate and play Bingo cards online for free.">
<meta property="og:type" content="website">
<meta property="og:image" content="/preview.jpg">

    <link rel="canonical" href="https://your-domain.com/" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Online Bingo Card Generator</h1>
        <p>Play Bingo online with automatically generated cards.</p>
    </header>

    <main>
            <div
                class="grid"
                role="grid"
                aria-label="Bingo game board"
            >
                <div class="grid__cell grid__cell__header" role="columnheader">B</div>
                <div class="grid__cell grid__cell__header" role="columnheader">I</div>
                <div class="grid__cell grid__cell__header" role="columnheader">N</div>
                <div class="grid__cell grid__cell__header" role="columnheader">G</div>
                <div class="grid__cell grid__cell__header" role="columnheader">O</div>

                <!-- Cells -->

                <div class="grid__cell grid__cell--B" role="gridcell"></div>
                <div class="grid__cell grid__cell--I" role="gridcell"></div>
                <div class="grid__cell grid__cell--N" role="gridcell"></div>
                <div class="grid__cell grid__cell--G" role="gridcell"></div>
                <div class="grid__cell grid__cell--O" role="gridcell"></div>

                <div class="grid__cell grid__cell--B" role="gridcell"></div>
                <div class="grid__cell grid__cell--I" role="gridcell"></div>
                <div class="grid__cell grid__cell--N" role="gridcell"></div>
                <div class="grid__cell grid__cell--G" role="gridcell"></div>
                <div class="grid__cell grid__cell--O" role="gridcell"></div>

                <div class="grid__cell grid__cell--B" role="gridcell"></div>
                <div class="grid__cell grid__cell--I" role="gridcell"></div>

                <div
                    class="grid__cell"
                    role="gridcell"
                    aria-label="Free Space"
                >
                    <img
                        src="star.svg"
                        class="icon"
                        alt="Free space"
                    />
                </div>

                <div class="grid__cell grid__cell--G" role="gridcell"></div>
                <div class="grid__cell grid__cell--O" role="gridcell"></div>

                <div class="grid__cell grid__cell--B" role="gridcell"></div>
                <div class="grid__cell grid__cell--I" role="gridcell"></div>
                <div class="grid__cell grid__cell--N" role="gridcell"></div>
                <div class="grid__cell grid__cell--G" role="gridcell"></div>
                <div class="grid__cell grid__cell--O" role="gridcell"></div>

                <div class="grid__cell grid__cell--B" role="gridcell"></div>
                <div class="grid__cell grid__cell--I" role="gridcell"></div>
                <div class="grid__cell grid__cell--N" role="gridcell"></div>
                <div class="grid__cell grid__cell--G" role="gridcell"></div>
                <div class="grid__cell grid__cell--O" role="gridcell"></div>
            </div>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
